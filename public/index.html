<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>quiet</title>

  <!-- A-Frame includes WebXR support and automatically shows the Enter VR button. -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="./gorilla-locomotion.js" defer></script>
  <script src="./map.js" defer></script>
  <script type="module" src="./main.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #note {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.68);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 360px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="note">
    Open this page in Meta Quest Browser, press Enter VR, and use the quiet VR menu to join a private code or public storm.
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    background="color: #171A20"
  >
    <a-entity light="type: ambient; intensity: 0.28; color: #8D96A0"></a-entity>
    <a-entity light="type: directional; intensity: 0.25; color: #87909B" position="-6 12 -4"></a-entity>
    <a-entity light="type: point; intensity: 0.25; distance: 22; color: #8FA7B8" position="-8 4 10"></a-entity>

    <a-sky color="#171A20"></a-sky>

    <a-entity
      id="player-rig"
      position="0 0.4 18"
      gorilla-locomotion="leftHand: #left-hand; rightHand: #right-hand; head: #player-camera; floorHeight: 0.05; playerHeightOffset: 0.72; spawnHeightOffset: 0.28; groundDrag: 58; airDrag: 2.8; gravity: -18; handPushMultiplier: 2.35; maxMovePerFrame: 0.62; maxVelocity: 15; maxLaunchSpeed: 15; oneHandLaunchMultiplier: 1.85; twoHandLaunchMultiplier: 2.35"
    >
      <a-camera id="player-camera" position="0 0 0" wasd-controls-enabled="false">
        <a-cursor
          id="vr-menu-cursor"
          raycaster="objects: .vr-clickable; far: 8"
          fuse="false"
          material="color: #DDE8EF; shader: flat"
          geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.02"
        ></a-cursor>
      </a-camera>
      <!-- Tracked Quest controllers with visible hand spheres for push locomotion. -->
      <a-entity id="left-hand" position="-0.35 -0.35 -0.4" tracked-controls="hand: left" raycaster="objects: .vr-clickable; far: 8" line="color: #DDE8EF; opacity: 0.35">
        <a-sphere id="left-hand-visual" radius="0.12" color="#FF7AA2" opacity="0.95"></a-sphere>
      </a-entity>

      <a-entity id="right-hand" position="0.35 -0.35 -0.4" tracked-controls="hand: right" raycaster="objects: .vr-clickable; far: 8" line="color: #DDE8EF; opacity: 0.35">
        <a-sphere id="right-hand-visual" radius="0.12" color="#6FC3FF" opacity="0.95"></a-sphere>
      </a-entity>
    </a-entity>

    <a-entity id="menu-environment">
      <a-plane
        position="0 -0.02 18"
        rotation="-90 0 0"
        width="12"
        height="12"
        color="#9EA1A6"
        roughness="1"
      ></a-plane>
      <a-plane position="0 3 12" width="12" height="6" color="#FFFFFF" roughness="1"></a-plane>
      <a-plane position="-6 3 18" rotation="0 90 0" width="12" height="6" color="#FFFFFF" roughness="1"></a-plane>
      <a-plane position="6 3 18" rotation="0 -90 0" width="12" height="6" color="#FFFFFF" roughness="1"></a-plane>
    </a-entity>

    <a-entity id="storm-plain-map"></a-entity>
    <a-entity id="vr-menu-root" position="0 2.05 14.2"></a-entity>
    <a-entity id="world-debug-panel" position="-3.15 2.55 14.3">
      <a-plane width="2.8" height="1.45" color="#111317" opacity="0.72"></a-plane>
      <a-text
        id="world-debug-text"
        value="world debug starting"
        position="-1.28 0.58 0.03"
        align="left"
        width="2.65"
        color="#F4F8F2"
        wrap-count="34"
      ></a-text>
    </a-entity>
    <a-entity id="remote-players"></a-entity>
  </a-scene>
</body>
</html>
