<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTag 1st Fan Game - Storm Plain</title>

  <!-- A-Frame includes WebXR support and automatically shows the Enter VR button. -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="./gorilla-locomotion.js" defer></script>
  <script src="./map.js" defer></script>
  <script type="module" src="./main.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #note {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.68);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 360px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="note">
    Open this page in Meta Quest Browser, press Enter VR, and move through the stormy grass hills with your hands.
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    background="color: #171A20"
  >
    <a-entity light="type: ambient; intensity: 0.28; color: #8D96A0"></a-entity>
    <a-entity light="type: directional; intensity: 0.25; color: #87909B" position="-6 12 -4"></a-entity>
    <a-entity light="type: point; intensity: 0.25; distance: 22; color: #8FA7B8" position="-8 4 10"></a-entity>

    <a-sky color="#171A20"></a-sky>

    <a-entity
      id="player-rig"
      position="0 1.2 18"
      gorilla-locomotion="leftHand: #left-hand; rightHand: #right-hand; head: #player-camera; floorHeight: 0.05; playerHeightOffset: 0; groundDrag: 85; airDrag: 4.2; gravity: -28"
    >
      <a-camera id="player-camera" position="0 0 0" wasd-controls-enabled="false"></a-camera>

      <!-- Tracked Quest controllers with visible hand spheres for push locomotion. -->
      <a-entity id="left-hand" position="-0.35 -0.35 -0.4" tracked-controls="hand: left">
        <a-sphere id="left-hand-visual" radius="0.12" color="#FF7AA2" opacity="0.95"></a-sphere>
      </a-entity>

      <a-entity id="right-hand" position="0.35 -0.35 -0.4" tracked-controls="hand: right">
        <a-sphere id="right-hand-visual" radius="0.12" color="#6FC3FF" opacity="0.95"></a-sphere>
      </a-entity>
    </a-entity>

    <a-entity id="storm-plain-map"></a-entity>
  </a-scene>
</body>
</html>
