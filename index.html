<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTag 1st Fan Game</title>

  <!-- A-Frame includes WebXR support and automatically shows the Enter VR button. -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="./gorilla-locomotion.js" defer></script>
  <script type="module" src="./main.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #note {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.68);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 360px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="note">
    Open this page in Meta Quest Browser, press Enter VR, and push against the floor or blocks with your hands.
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    background="color: #CFE8FF"
  >
    <a-entity light="type: ambient; intensity: 0.72"></a-entity>
    <a-entity light="type: directional; intensity: 0.9" position="3 6 2"></a-entity>

    <a-sky color="#CFE8FF"></a-sky>

    <a-entity
      id="player-rig"
      position="0 0 4"
      gorilla-locomotion="leftHand: #left-hand; rightHand: #right-hand; head: #player-camera; debugText: #debug-text; playerHeightOffset: 0.68"
    >
      <a-camera id="player-camera" position="0 0 0" wasd-controls-enabled="false">
        <a-entity id="debug-panel" position="0 -0.12 -1.2">
          <a-plane width="2.4" height="1.6" color="#111111" opacity="0.82"></a-plane>
          <a-text
            id="debug-text"
            position="-1.09 0.66 0.01"
            align="left"
            anchor="left"
            baseline="top"
            width="2.2"
            color="#FFFFFF"
            value="Waiting for hand tracking..."
          ></a-text>
        </a-entity>
      </a-camera>

      <!-- Tracked Quest controllers with visible hand spheres for push locomotion. -->
      <a-entity id="left-hand" position="-0.35 -0.35 -0.4" tracked-controls="hand: left">
        <a-sphere id="left-hand-visual" radius="0.12" color="#FF7AA2" opacity="0.95"></a-sphere>
      </a-entity>

      <a-entity id="right-hand" position="0.35 -0.35 -0.4" tracked-controls="hand: right">
        <a-sphere id="right-hand-visual" radius="0.12" color="#6FC3FF" opacity="0.95"></a-sphere>
      </a-entity>
    </a-entity>

    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="28"
      height="28"
      color="#4FAD5B"
      locomotion-collider="type: floor; size: 28 0 28"
    ></a-plane>

    <a-box
      position="0 1 -3"
      width="1.8"
      height="2"
      depth="1.8"
      color="#F28749"
      locomotion-collider="type: box; size: 1.8 2 1.8"
    ></a-box>

    <a-box
      position="-2.4 1.5 -5"
      width="1.6"
      height="3"
      depth="1.6"
      color="#E35D6A"
      locomotion-collider="type: box; size: 1.6 3 1.6"
    ></a-box>

    <a-box
      position="2.6 0.8 -4.5"
      width="2.4"
      height="1.6"
      depth="1.6"
      color="#6A7BFF"
      locomotion-collider="type: box; size: 2.4 1.6 1.6"
    ></a-box>

    <a-box
      position="0 1.25 -7"
      width="6"
      height="2.5"
      depth="0.6"
      color="#9A6CF0"
      locomotion-collider="type: box; size: 6 2.5 0.6"
    ></a-box>

    <a-plane position="0 2.8 -3" width="4.8" height="0.9" color="#FFFFFF">
      <a-text
        value="GTag 1st Fan Game"
        position="0 0 0.01"
        color="#111111"
        width="4.2"
        align="center"
      ></a-text>
    </a-plane>
  </a-scene>
</body>
</html>
